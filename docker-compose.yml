# =============================================================================
# price-compare — Docker Compose
# =============================================================================
# Spins up the price-compare Next.js app, a Redis cache, and a Selenium
# Grid Chrome node (required by the Dis-Chem scraper).
#
# The Checkers scraper depends on an external Sixty60-Search microservice
# (separate repo). Set CHECKERS_API_URL to point at it — default is the
# same host's port 3001, which works when that service is running alongside.
# =============================================================================

services:
  # ── Next.js App ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: price-compare:latest
    container_name: price-compare
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      SELENIUM_URL: http://selenium:4444
      CHECKERS_API_URL: ${CHECKERS_API_URL:-http://host.docker.internal:3001}
    depends_on:
      redis:
        condition: service_started
      selenium:
        condition: service_started
    restart: unless-stopped

  # ── Redis Cache ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: price-compare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Selenium Grid (Chrome) ─────────────────────────────────────────
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: price-compare-selenium
    shm_size: 2gb
    restart: unless-stopped
    ports:
      - "4444:4444"
    environment:
      SE_NODE_MAX_SESSIONS: 3
      SE_VNC_PASSWORD: ${SE_VNC_PASSWORD:-}
      SE_SESSION_REQUEST_TIMEOUT: 60
      SE_OPTS: "--session-timeout 60"
    volumes:
      - /dev/shm:/dev/shm
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4444/status"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  redis-data:
    driver: local
